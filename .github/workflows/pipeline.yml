name: Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Lambda images
        working-directory: functions/append-eventbridge-to-bronze
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: snacker-tracker-lambda/append-to-bronze
          VERSION: ${{ github.run_number }}
        run: |
          docker build --target append-to-bronze -t $REGISTRY/$REPO:$VERSION-append .
          docker build --target rebuild-bronze -t $REGISTRY/$REPO:$VERSION-rebuild .
          docker push $REGISTRY/$REPO:$VERSION-append
          docker push $REGISTRY/$REPO:$VERSION-rebuild

  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    needs:
      - build
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.0"
      - name: Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform workspace select --or-create dev
          terraform apply --auto-approve --var version_label=${{ github.run_number }} --var domain=reporter-dev.khanom.xyz

  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs:
      - deploy-dev
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.0"
      - name: Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          terraform init
          terraform workspace select --or-create prod
          terraform apply --auto-approve --var version_label=${{ github.run_number }} --var domain=reporter.khanom.xyz
